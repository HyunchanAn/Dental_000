name: Central QA Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out QA Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Ruff Linting
      run: |
        ruff check . || echo "Ruff failed but continuing"

    - name: Run Global Tests (Pytest)
      run: |
        # Only run unit tests, ignore E2E tests if they require downloading huge weights
        # Run pytest per-directory to avoid module namespace collisions (e.g., multiple 'src' modules)
        for dir in tests/tests_*/; do
          if [ -d "$dir" ]; then
            echo "Running pytest in $dir"
            pytest "$dir" -v --ignore-glob="*e2e*.py" || exit 1
          fi
        done
