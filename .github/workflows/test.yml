name: Central QA Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out QA Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Ruff Linting
      run: |
        ruff check .

    - name: Run Global Tests (Pytest)
      run: |
        # Only run unit tests, ignore E2E tests if they require downloading huge weights
        pytest tests/ -v --ignore-glob="*e2e*.py"
