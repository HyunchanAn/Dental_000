name: Central Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.10"
      install_opencv:
        required: false
        type: boolean
        default: false
      test_command:
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout caller code
      uses: actions/checkout@v4

    - name: Checkout Central Tests (Dental_000)
      uses: actions/checkout@v4
      with:
        repository: HyunchanAn/Dental_000
        path: Dental_000

    - name: Set up Python ${{ inputs.python_version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}
        cache: 'pip'

    - name: Install system dependencies (OpenCV)
      if: ${{ inputs.install_opencv }}
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install build pytest-cov pytest pytest-asyncio pytest-mock ruff
        if [ -f setup.py ] || [ -f pyproject.toml ]; then pip install -e . || echo "No editable install possible"; fi

    - name: Lint with Ruff
      run: |
        ruff check . || echo "Ruff failed but continuing"

    - name: Run Tests
      run: |
        ${{ inputs.test_command }}

    - name: Build Python packages (Sdist & Wheel)
      run: |
        python -m build || echo "Build skipped or failed"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        if [ -f Dockerfile ]; then
          docker build -t dentex-module:latest .
        else
          echo "No Dockerfile found, skipping docker build."
        fi
